<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ofir Marzouk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&family=Special+Elite&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #fff;
      overflow: hidden;
    }

    /* ─── Screens ─────────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
    }

    /* ─── Welcome ─────────────────────────────────── */
    #welcome-text {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 5rem);
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #000;
      opacity: 0;
      cursor: default;
      user-select: none;
      /* transition is set dynamically so fade-in and fade-out can have different timings */
    }

    /* ─── Intro ───────────────────────────────────── */
    #intro-screen {
      padding: 0 2rem;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #intro-text {
      font-family: 'Special Elite', cursive;
      font-size: clamp(0.95rem, 1.4vw, 1.2rem);
      line-height: 2.1;
      color: #1a1a1a;
      max-width: 680px;
      white-space: pre-wrap;
    }

    /* ─── Projects ────────────────────────────────── */
    #projects-screen {
      align-items: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 80px 64px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #projects-container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 96px;
    }

    /* ─── Project row ─────────────────────────────── */
    .project-row {
      display: flex;
      align-items: center;
      gap: 56px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .project-row.reverse { flex-direction: row-reverse; }
    .project-row.visible { opacity: 1; transform: translateY(0); }

    /* ─── Project image box ───────────────────────── */
    .project-box {
      flex-shrink: 0;
      width: 320px; height: 240px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #efefef;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .project-box:hover { transform: scale(1.03); }

    .project-box img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: #ccc;
      font-family: 'JetBrains Mono', monospace;
    }

    .placeholder-icon { font-size: 2rem; }
    .placeholder-label { font-size: 0.68rem; letter-spacing: 0.05em; }

    .title-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
    }

    .title-overlay h3 {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.06em;
      color: #fff;
    }

    /* ─── Project description ─────────────────────── */
    .desc-wrap { flex: 1; max-width: 480px; }

    .desc {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.72rem, 1vw, 0.85rem);
      line-height: 1.9;
      color: #555;
      white-space: pre-wrap;
      min-height: 1.5em;
    }

    .proj-link {
      display: inline-block;
      margin-top: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: #aaa;
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #ddd;
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .proj-link:hover { color: #333; border-color: #999; }

    /* ─── Blinking cursor ─────────────────────────── */
    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: currentColor;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.06s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .cursor.done { display: none; }

    /* ═══════════════════════════════════════════════
       CHATBOT
    ═══════════════════════════════════════════════ */

    /* ─── Bot trigger button ──────────────────────── */
    #bot-btn {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 1000;
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid #e0e0e0;
      background: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s, transform 0.2s;
      padding: 0;
    }
    #bot-btn:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      transform: scale(1.06);
    }
    #bot-btn svg { width: 20px; height: 20px; color: #333; }

    /* Tooltip */
    #bot-btn::after {
      content: "Ofir's Bot — ask me about my experience";
      position: absolute;
      top: calc(100% + 8px); right: 0;
      background: #111;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      white-space: nowrap;
      padding: 5px 10px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #bot-btn:hover::after { opacity: 1; }

    /* ─── Chat window ─────────────────────────────── */
    #chat-window {
      position: fixed;
      top: 76px; right: 20px;
      z-index: 999;
      width: 360px; height: calc(100vh - 110px); max-height: 480px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
      overflow: hidden;
      transform-origin: top right;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.28s cubic-bezier(0.34, 1.4, 0.64, 1),
                  opacity 0.2s ease;
    }
    #chat-window.open {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    /* ─── Chat header ─────────────────────────────── */
    #chat-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    #chat-header-title {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      color: #111;
    }
    #chat-header-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: #bbb;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }
    #chat-close {
      background: none; border: none; cursor: pointer;
      color: #bbb; font-size: 1.2rem; line-height: 1;
      padding: 2px 4px;
      transition: color 0.2s;
    }
    #chat-close:hover { color: #333; }

    /* ─── Messages area ───────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #eee; border-radius: 2px; }

    .msg {
      max-width: 85%;
      padding: 9px 13px;
      border-radius: 10px;
      font-size: 0.8rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #111;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      border-bottom-right-radius: 3px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #f5f5f5;
      color: #333;
      font-family: 'JetBrains Mono', monospace;
      border-bottom-left-radius: 3px;
    }
    .msg.bot.thinking {
      color: #bbb;
      font-style: italic;
    }
    .msg.bot.thinking::after {
      content: '';
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #ccc;
      margin-left: 6px;
      vertical-align: middle;
      animation: dot-pulse 1s step-end infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ─── Input row ───────────────────────────────── */
    #chat-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      color: #111;
      outline: none;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: #bbb; background: #fff; }
    #chat-input::placeholder { color: #ccc; }
    #chat-send {
      width: 34px; height: 34px;
      border-radius: 6px;
      border: none;
      background: #111;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #chat-send:hover { background: #333; }
    #chat-send:disabled { background: #ddd; cursor: default; }
  </style>
</head>
<body>

  <!-- ── Chatbot ──────────────────────────────────────── -->
  <button id="bot-btn" aria-label="Open Ofir's Bot">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <div id="chat-window" role="dialog" aria-label="Ofir's Bot">
    <div id="chat-header">
      <div>
        <div id="chat-header-title">Ofir's Bot</div>
        <div id="chat-header-sub">// ask me about my experience</div>
      </div>
      <button id="chat-close" aria-label="Close chat">×</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Ask me anything..." autocomplete="off" />
      <button id="chat-send" aria-label="Send">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Stage 1 -->
  <div class="screen" id="welcome-screen">
    <h1 id="welcome-text">Welcome</h1>
  </div>

  <!-- Stage 2 -->
  <div class="screen" id="intro-screen">
    <p id="intro-text"></p>
  </div>

  <!-- Stage 3 -->
  <div class="screen" id="projects-screen">
    <div id="projects-container"></div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════
       ✏️  YOUR CONTENT — edit these two sections
       ═══════════════════════════════════════════════════ */

    const INTRO_TEXT =
      "My name is Ofir Marzouk and I'm a software developer with legal background.\n" +
      "I am developing AI powered tools for the legal tech industry, property tech and business.\n" +
      "I'm passionate about AI, web3 and Robotics, so follow me in the future to discover more\n\n" +
      "Here are some of my projects:";

    // Add your projects here.
    // image: path relative to this file, e.g. 'assets/projects/my-app.png'
    //        set to null until you have the asset ready.
    // link:  optional URL, set to null to hide the "view project" link.
    const PROJECTS = [
      {
        title:       'Project One',
        description: '// description coming soon',
        image:       null,
        link:        null,
      },
      {
        title:       'Project Two',
        description: '// description coming soon',
        image:       null,
        link:        null,
      },
      {
        title:       'Project Three',
        description: '// description coming soon',
        image:       null,
        link:        null,
      },
      {
        title:       'Project Four',
        description: '// description coming soon',
        image:       null,
        link:        null,
      },
      {
        title:       'Project Five',
        description: '// description coming soon',
        image:       null,
        link:        null,
      },
      {
        title:       'Project Six',
        description: '// description coming soon',
        image:       null,
        link:        null,
      },
    ];

    /* ═══════════════════════════════════════════════════
       TYPEWRITER
       ═══════════════════════════════════════════════════ */

    function typewriter(el, text, speed, onDone) {
      el.textContent = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.appendChild(cursor);

      let i = 0;
      const id = setInterval(() => {
        if (i < text.length) {
          cursor.insertAdjacentText('beforebegin', text[i++]);
        } else {
          clearInterval(id);
          cursor.classList.add('done');
          if (onDone) onDone();
        }
      }, speed);

      return () => clearInterval(id);
    }

    /* ═══════════════════════════════════════════════════
       STAGE 1 — WELCOME
       ═══════════════════════════════════════════════════ */

    const welcomeEl = document.getElementById('welcome-text');

    requestAnimationFrame(() => requestAnimationFrame(() => {
      welcomeEl.style.transition = 'opacity 0.9s ease, letter-spacing 0.9s ease';
      welcomeEl.style.opacity = '1';
      welcomeEl.style.letterSpacing = '0.5em';
    }));

    setTimeout(() => {
      welcomeEl.style.transition = 'opacity 1.5s ease, letter-spacing 1.5s ease';
      welcomeEl.style.opacity = '0';
      welcomeEl.style.letterSpacing = '0.8em';
    }, 2200);

    /* ═══════════════════════════════════════════════════
       STAGE 2 — INTRO TYPEWRITER
       ═══════════════════════════════════════════════════ */

    setTimeout(() => {
      document.getElementById('welcome-screen').style.display = 'none';
      const introScreen = document.getElementById('intro-screen');
      introScreen.style.opacity = '1';

      const introEl = document.getElementById('intro-text');
      typewriter(introEl, INTRO_TEXT, 38, () => {
        setTimeout(() => {
          introScreen.style.opacity = '0';
          setTimeout(startProjects, 900);
        }, 1800);
      });

    }, 3800);

    /* ═══════════════════════════════════════════════════
       STAGE 3 — PROJECTS
       ═══════════════════════════════════════════════════ */

    function startProjects() {
      document.getElementById('intro-screen').style.display = 'none';
      const projectsScreen = document.getElementById('projects-screen');
      projectsScreen.style.opacity = '1';
      buildCards();
    }

    function buildCards() {
      const container = document.getElementById('projects-container');

      PROJECTS.forEach((p, index) => {

        const row = document.createElement('div');
        row.className = 'project-row' + (index % 2 !== 0 ? ' reverse' : '');

        const box = document.createElement('div');
        box.className = 'project-box';

        if (p.image) {
          const img = document.createElement('img');
          img.src = p.image;
          img.alt = p.title;
          img.onerror = () => img.replaceWith(makePlaceholder());
          box.appendChild(img);
        } else {
          box.appendChild(makePlaceholder());
        }

        const overlay = document.createElement('div');
        overlay.className = 'title-overlay';
        overlay.innerHTML = `<h3>${p.title}</h3>`;
        box.appendChild(overlay);

        const descWrap = document.createElement('div');
        descWrap.className = 'desc-wrap';

        const descEl = document.createElement('p');
        descEl.className = 'desc';
        descWrap.appendChild(descEl);

        if (p.link) {
          const a = document.createElement('a');
          a.href = p.link;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = 'proj-link';
          a.textContent = '→ view project';
          descWrap.appendChild(a);
        }

        row.appendChild(box);
        row.appendChild(descWrap);
        container.appendChild(row);

        let cancel = null;
        let done = false;

        function startDesc() {
          if (cancel) cancel();
          done = false;
          cancel = typewriter(descEl, p.description, 28, () => { done = true; });
        }

        setTimeout(() => {
          row.classList.add('visible');
          setTimeout(startDesc, 250);
        }, index * 700);

        box.addEventListener('mouseenter', () => { if (done) startDesc(); });
      });
    }

    function makePlaceholder() {
      const el = document.createElement('div');
      el.className = 'placeholder';
      el.innerHTML = `<span class="placeholder-icon">[ ]</span>
                      <span class="placeholder-label">image pending</span>`;
      return el;
    }

    /* ═══════════════════════════════════════════════════
       CHATBOT
       ═══════════════════════════════════════════════════ */

    const WORKER_URL      = 'https://ofirs-bot.ofir08.workers.dev';
    const ANTHROPIC_MODEL = 'claude-opus-4-6';

    const BOT_GREETING = "Hi! I'm Ofir's AI assistant.\nAsk me about his skills, projects, experience, or background — I'm here to help.";

    const chatHistory = [];
    let CV_DATA = null;

    async function loadCV() {
      try {
        const res = await fetch('./cv.json');
        if (res.ok) CV_DATA = await res.text();
      } catch {}
      if (!CV_DATA) {
        CV_DATA = JSON.stringify({
          name: 'Ofir Marzouk',
          title: 'AI Solutions & QA Associate | Software Developer | Legal Engineer',
          note: 'Full CV available at cv.json'
        });
      }
    }

    function buildSystemPrompt() {
      return `You are Ofir's Bot, a helpful AI assistant on Ofir Marzouk's portfolio website.
Your role is to answer questions about Ofir's professional background, skills, projects, and experience.
Be concise, friendly, and professional. Refer to Ofir in the third person (e.g. "Ofir has experience in…").
If asked something not covered by the CV, say you don't have that info but invite them to reach out directly.
Keep answers short — 2–4 sentences unless more detail is asked for.

Here is Ofir's CV data (JSON):
${CV_DATA}`;
    }

    const chatWindow   = document.getElementById('chat-window');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput    = document.getElementById('chat-input');
    const chatSend     = document.getElementById('chat-send');
    let chatReady = false;

    function appendMsg(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      chatMessages.appendChild(el);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return el;
    }

    async function initChat() {
      if (chatReady) return;
      await loadCV();
      appendMsg('bot', BOT_GREETING);
      chatReady = true;
    }

    document.getElementById('bot-btn').addEventListener('click', () => {
      const isOpen = chatWindow.classList.toggle('open');
      if (isOpen) { initChat(); chatInput.focus(); }
    });

    document.getElementById('chat-close').addEventListener('click', () => {
      chatWindow.classList.remove('open');
    });

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || !chatReady) return;

      chatInput.value = '';
      chatSend.disabled = true;

      appendMsg('user', text);
      chatHistory.push({ role: 'user', content: text });

      if (chatHistory.length > 20) chatHistory.splice(0, chatHistory.length - 20);

      const thinkingEl = appendMsg('bot', 'thinking');
      thinkingEl.classList.add('thinking');

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: ANTHROPIC_MODEL,
            max_tokens: 1024,
            stream: true,
            system: buildSystemPrompt(),
            messages: chatHistory,
          }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          thinkingEl.classList.remove('thinking');
          thinkingEl.textContent = '⚠ ' + (err.error?.message || `API error ${response.status}`);
          chatSend.disabled = false;
          return;
        }

        thinkingEl.classList.remove('thinking');
        thinkingEl.textContent = '';

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';
        let fullText  = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (!data || data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
                fullText += parsed.delta.text;
                thinkingEl.textContent = fullText;
                chatMessages.scrollTop = chatMessages.scrollHeight;
              }
            } catch {}
          }
        }

        if (fullText) chatHistory.push({ role: 'assistant', content: fullText });

      } catch (err) {
        thinkingEl.classList.remove('thinking');
        thinkingEl.textContent = '⚠ Connection error. Check your network and try again.';
      }

      chatSend.disabled = false;
      chatInput.focus();
    }

    chatSend.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });
  </script>
</body>
</html>
